<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AOE II Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Análisis de Age of Empires II</h1>

        <p class="subtitle">
            Visualización de rendimiento, ELO, civilizaciones y actividad de juego.
        </p>

        <!-- RAWGRAPH -->

        <section>

            <h2>En función del día, ¿Cuándo juego?</h2>

            <img
                src="assets/rawgraph.svg"
                alt="RAWGraphs visualization">

        </section>

        <!-- DATAWRAPPER -->

        <section>

            <h2>Evolución del ELO</h2>

            <iframe
                title="Age of Empires II - ¿Cómo me fue?"
                aria-label="Line chart"
                src="https://datawrapper.dwcdn.net/XewA1/1/"
                scrolling="no"
                frameborder="0"
                style="width: 0; min-width: 100% !important; border: none;"
                height="500"
                data-external="1">

            </iframe>

            <script type="text/javascript">
                window.addEventListener("message", function (a) {
                    if (void 0 !== a.data["datawrapper-height"]) {
                        var e = document.querySelectorAll("iframe");
                        for (var t in a.data["datawrapper-height"])
                            for (var r, i = 0; r = e[i]; i++)
                                if (r.contentWindow === a.source) {
                                    var d = a.data["datawrapper-height"][t] + "px";
                                    r.style.height = d
                                }
                    }
                });
            </script>

        </section>

        <!-- FLOURISH -->

        <section>

            <h2>Relación entre Civilizaciones</h2>

            <div class="flourish-embed flourish-hierarchy"
                data-src="visualisation/28892657">

                <script src="https://public.flourish.studio/resources/embed.js"></script>

                <noscript>
                    <img
                        src="https://public.flourish.studio/visualisation/28892657/thumbnail"
                        width="100%"
                        alt="hierarchy visualization" />
                </noscript>

            </div>

        </section>

        <!-- TABLEAU -->

        <section>

            <h2>Porcentaje de Victorias por Civilización</h2>

            <iframe
                src="https://public.tableau.com/views/TP_AoE2_dashboard_1/PorcentajedeVictoriasporCivilizacion?:showVizHome=no"
                width="100%"
                height="700"
                frameborder="0">
            </iframe>

        </section>

    </div>

</body>

</html>
